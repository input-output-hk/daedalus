name: Publish Agentic KB Develop Baseline

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-develop-baseline:
    name: Publish develop baseline snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      AGENTIC_COMPOSE_FILE: docker-compose.agentic.yml
      SNAPSHOT_PROOF_QUERY: GitHub Releases assets are out of scope for KB snapshot sharing
      AGENTIC_KB_SYNC_GITHUB_TOKEN: ${{ secrets.AGENTIC_KB_SYNC_GITHUB_TOKEN }}
      ARTIFACT_NAME: agentic-kb-develop-baseline-${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require develop branch dispatch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/develop" ]; then
            printf 'Canonical agentic KB baseline publication is allowed only from refs/heads/develop. Received %s\n' "${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Require explicit GitHub sync token secret
        run: |
          if [ -z "${AGENTIC_KB_SYNC_GITHUB_TOKEN}" ]; then
            printf 'Missing required secret AGENTIC_KB_SYNC_GITHUB_TOKEN. This workflow runs sync github and sync project, so it requires an explicit token with repository read access and DripDropz ProjectV2 read access rather than the default GITHUB_TOKEN.\n' >&2
            exit 1
          fi

      - name: Build kb-tools image
        run: docker compose -f "${AGENTIC_COMPOSE_FILE}" build kb-tools

      - name: Bootstrap agentic services
        env:
          GITHUB_TOKEN: ${{ env.AGENTIC_KB_SYNC_GITHUB_TOKEN }}
        run: docker compose -f "${AGENTIC_COMPOSE_FILE}" up -d paradedb ollama

      - name: Pull configured Ollama embedding model
        env:
          GITHUB_TOKEN: ${{ env.AGENTIC_KB_SYNC_GITHUB_TOKEN }}
        run: docker compose -f "${AGENTIC_COMPOSE_FILE}" up --exit-code-from ollama-init ollama-init

      - name: Build fresh KB baseline
        env:
          GITHUB_TOKEN: ${{ env.AGENTIC_KB_SYNC_GITHUB_TOKEN }}
        run: docker compose -f "${AGENTIC_COMPOSE_FILE}" run --rm kb-tools sync all

      - name: Export baseline snapshot pair
        id: export_snapshot
        env:
          GITHUB_TOKEN: ${{ env.AGENTIC_KB_SYNC_GITHUB_TOKEN }}
        run: |
          mkdir -p agentic/snapshots
          python3 - <<'PY' > "${RUNNER_TEMP}/agentic-kb-snapshots-before.json"
          import json
          from pathlib import Path

          root = Path("agentic/snapshots")
          files = sorted(path.name for path in root.iterdir() if path.is_file()) if root.exists() else []
          print(json.dumps(files))
          PY
          docker compose -f "${AGENTIC_COMPOSE_FILE}" run --rm kb-tools snapshot export
          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import json
          import os
          from pathlib import Path

          before_path = Path(os.environ["RUNNER_TEMP"]) / "agentic-kb-snapshots-before.json"
          before = set(json.loads(before_path.read_text(encoding="utf-8")))
          root = Path("agentic/snapshots")
          new_dumps = sorted(
              [path for path in root.glob("*.dump") if path.name not in before],
              key=lambda path: path.stat().st_mtime_ns,
          )
          if len(new_dumps) != 1:
              raise SystemExit(
                  f"expected exactly one new snapshot dump after export, found {len(new_dumps)}"
              )
          dump_path = new_dumps[0]
          manifest_path = dump_path.with_name(f"{dump_path.stem}.manifest.json")
          if not manifest_path.exists():
              raise SystemExit(f"expected sibling manifest beside {dump_path}")
          print(f"dump_path={dump_path.as_posix()}")
          print(f"manifest_path={manifest_path.as_posix()}")
          PY

      - name: Verify status JSON
        env:
          GITHUB_TOKEN: ${{ env.AGENTIC_KB_SYNC_GITHUB_TOKEN }}
        run: |
          docker compose -f "${AGENTIC_COMPOSE_FILE}" run --rm kb-tools status --json > "${RUNNER_TEMP}/agentic-kb-status.json"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(
              (Path(os.environ["RUNNER_TEMP"]) / "agentic-kb-status.json").read_text(encoding="utf-8")
          )
          if payload.get("ok") is not True:
              raise SystemExit(f"status --json reported a non-ok result: {payload}")
          PY

      - name: Verify deterministic BM25 proof
        env:
          GITHUB_TOKEN: ${{ env.AGENTIC_KB_SYNC_GITHUB_TOKEN }}
        run: |
          docker compose -f "${AGENTIC_COMPOSE_FILE}" run --rm kb-tools search --entity-type documents --mode bm25 --json "${SNAPSHOT_PROOF_QUERY}" > "${RUNNER_TEMP}/agentic-kb-search-proof.json"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(
              (Path(os.environ["RUNNER_TEMP"]) / "agentic-kb-search-proof.json").read_text(encoding="utf-8")
          )
          if payload.get("mode") != "bm25":
              raise SystemExit(f"expected bm25 mode, received {payload.get('mode')!r}")
          hits = payload.get("hits")
          if not isinstance(hits, list) or not hits:
              raise SystemExit("expected at least one BM25 hit for the deterministic proof query")
          first_hit = hits[0]
          if first_hit.get("entity_type") != "documents":
              raise SystemExit(
                  f"expected first hit entity_type documents, received {first_hit.get('entity_type')!r}"
              )
          source_path = first_hit.get("fields", {}).get("source_path")
          if source_path != ".agent/workflows/agentic-kb.md":
              raise SystemExit(
                  f"expected first hit source_path .agent/workflows/agentic-kb.md, received {source_path!r}"
              )
          PY

      - name: Upload baseline artifact pair
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ steps.export_snapshot.outputs.dump_path }}
            ${{ steps.export_snapshot.outputs.manifest_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Teardown agentic services
        if: always()
        run: docker compose -f "${AGENTIC_COMPOSE_FILE}" down -v
