services:
  paradedb:
    image: paradedb/paradedb@sha256:5df9a7d78ad9b8c2fe1d4f0098b4cbd48c3e3e543925059d21465a81916830b7
    ports:
      - "127.0.0.1:${AGENTIC_DB_PORT:-5445}:5432"
    environment:
      - POSTGRES_DB=${AGENTIC_DB_NAME:-agentic_kb}
      - POSTGRES_USER=${AGENTIC_DB_USER:-agentic}
      - POSTGRES_PASSWORD=${AGENTIC_DB_PASSWORD:-agentic}
    volumes:
      - paradedb_data:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${AGENTIC_DB_USER:-agentic} -d ${AGENTIC_DB_NAME:-agentic_kb}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  ollama:
    image: ollama/ollama@sha256:ff17815f73e64408bbd723bb8e570770dfb612238e59e4c9bc5832ec7928df82
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test:
        - CMD-SHELL
        - ollama list >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama@sha256:ff17815f73e64408bbd723bb8e570770dfb612238e59e4c9bc5832ec7928df82
    entrypoint:
      - /bin/sh
      - -ec
      - ollama pull "$${OLLAMA_EMBED_MODEL}"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-all-minilm}
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  kb-tools:
    build:
      context: ./agentic
    environment:
      - DATABASE_URL=postgresql://${AGENTIC_DB_USER:-agentic}:${AGENTIC_DB_PASSWORD:-agentic}@paradedb:5432/${AGENTIC_DB_NAME:-agentic_kb}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-all-minilm}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - .:/workspace
      - ./agentic/snapshots:/workspace/agentic/snapshots
    depends_on:
      paradedb:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    working_dir: /workspace
    healthcheck:
      test:
        - CMD
        - agentic-kb
        - status
        - --healthcheck
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  mcp-search:
    image: python:3.12-alpine@sha256:7747d47f92cfca63a6e2b50275e23dba8407c30d8ae929a88ddd49a5d3f2d331
    environment:
      - DATABASE_URL=postgresql://${AGENTIC_DB_USER:-agentic}:${AGENTIC_DB_PASSWORD:-agentic}@paradedb:5432/${AGENTIC_DB_NAME:-agentic_kb}
      - OLLAMA_BASE_URL=http://ollama:11434
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - mcp_search_data:/var/lib/mcp-search
    depends_on:
      paradedb:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /var/lib/mcp-search
        printf 'mcp-search placeholder service; replace in task-104\n' > /var/lib/mcp-search/README.txt
        touch /tmp/mcp-search.ready
        trap 'exit 0' TERM INT
        while :; do sleep 3600; done
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /tmp/mcp-search.ready
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  paradedb_data:
    driver: local
  ollama_data:
    driver: local
  mcp_search_data:
    driver: local
